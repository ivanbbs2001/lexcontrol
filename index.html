<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LexControl — Gestão de Escritório</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
  <script type="module">
    import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc }
                                 from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    /* ════════════════════════════════════════════
       🔧 CONFIGURAÇÃO DO FIREBASE
       Firebase Console → Configurações → Seus apps
    ════════════════════════════════════════════ */
    const firebaseConfig = {
      apiKey:            "COLE_AQUI_apiKey",
      authDomain:        "COLE_AQUI_authDomain",
      projectId:         "COLE_AQUI_projectId",
      storageBucket:     "COLE_AQUI_storageBucket",
      messagingSenderId: "COLE_AQUI_messagingSenderId",
      appId:             "COLE_AQUI_appId",
    };
    /* ════════════════════════════════════════════
       🏢 ID DO ESCRITÓRIO
    ════════════════════════════════════════════ */
    const WORKSPACE_ID = "meu-escritorio";
    /* ════════════════════════════════════════════
       🤖 CHAVE ANTHROPIC  console.anthropic.com
    ════════════════════════════════════════════ */
    const ANTHROPIC_KEY = "COLE_AQUI_sk-ant-...";

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const wsDoc = n => doc(db,"workspaces",WORKSPACE_ID,"data",n);
    window.__firebase = {
      saveList:         (n,it) => setDoc(wsDoc(n),{items:it},{merge:false}),
      saveSetting:      (n,v)  => setDoc(wsDoc(n),{value:v},{merge:false}),
      subscribeList:    (n,cb) => onSnapshot(wsDoc(n),s=>cb(s.exists()?(s.data().items??[]):[])),
      subscribeSetting: (n,cb) => onSnapshot(wsDoc(n),s=>{if(s.exists())cb(s.data().value);}),
      ANTHROPIC_KEY,
    };
    window.dispatchEvent(new Event("firebase-ready"));
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;}
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#767068;border-radius:3px;}
    input,select,textarea{outline:none;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    .spin{animation:spin .7s linear infinite;}
    .pulse{animation:pulse 1.4s ease-in-out infinite;}
    .row-hover:hover{background:var(--hr,#beb8ac)!important;cursor:default;}
    .bhov:hover{opacity:.72;cursor:pointer;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef}=React;

/* ── THEMES ─────────────────────────────────────────────── */
const THEMES={
  industrial:{id:"industrial",label:"🔩 Industrial",
    bg:"#c5bdb0",card:"#d5cfc3",card2:"#cdc7ba",border:"#a09890",border2:"#767068",
    text:"#1a1410",muted:"#58504a",strong:"#0c0804",

    successBg:"#d4ecd4",successText:"#185018",
    warnBg:"#ece4c8",warnText:"#7a4808",
    infoBg:"#d0e0ec",infoText:"#183060",
    hdr:"#b4ada0",stripe:"#cfc9bc",

  },
  dark:{id:"dark",label:"🌙 Escuro",
    bg:"#06101e",card:"#0c1828",card2:"#091422",border:"#192c44",border2:"#243d5c",
    text:"#c2d2e6",muted:"#4e6278",strong:"#daeaf8",
    accent:"#d4b86a",accentText:"#06101e",accentDim:"#1c1508",
    hover:"#112033",inp:"#091422",
    dangerBg:"#270d0d",dangerText:"#f87171",dangerBorder:"#7f1d1d",
    successBg:"#051e0f",successText:"#4ade80",
    warnBg:"#27190a",warnText:"#fbbf24",
    infoBg:"#081a34",infoText:"#60a5fa",
    hdr:"#040c18",stripe:"#081322",
    tabActive:"#d4b86a",tabActiveText:"#06101e",
    sOkBg:"#051e0f",sOkTx:"#4ade80",sOkDot:"#4ade80",
    sErrBg:"#270d0d",sErrTx:"#f87171",sErrDot:"#ef4444",
    sWaitBg:"#27190a",sWaitTx:"#fbbf24",sWaitDot:"#f59e0b",
  },
  light:{id:"light",label:"☀️ Claro",
    bg:"#f0ebe0",card:"#fdfaf4",card2:"#f5f0e8",border:"#d8cdb8",border2:"#b8a888",
    text:"#241808",muted:"#7a6850",strong:"#100c04",
    accent:"#8a6010",accentText:"#fff",accentDim:"#fdf5e0",
    hover:"#ebe4d4",inp:"#f5f0e8",
    dangerBg:"#fff3f3",dangerText:"#991c1c",dangerBorder:"#fca5a5",
    successBg:"#ecfdf5",successText:"#166534",
    warnBg:"#fffbeb",warnText:"#b45309",
    infoBg:"#eff6ff",infoText:"#1e40af",
    hdr:"#e4ddd0",stripe:"#f8f3ea",
    tabActive:"#8a6010",tabActiveText:"#fff",
    sOkBg:"#ecfdf5",sOkTx:"#166534",sOkDot:"#22c55e",
    sErrBg:"#fff3f3",sErrTx:"#991c1c",sErrDot:"#ef4444",
    sWaitBg:"#fffbeb",sWaitTx:"#b45309",sWaitDot:"#f59e0b",
  },
};

/* ── CONSTANTS ───────────────────────────────────────────── */
const MFL=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MFS=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const COST_CATS=["Aluguel","Energia","Internet","Telefone","Software","Pessoal","Contabilidade","Material de Escritório","Transporte","Outros"];
const AREAS=["Cível","Previdenciária","Penal / Criminal","Trabalhista","Administrativa","Consumidor","Família e Sucessões","Tributária / Fiscal","Empresarial","Imobiliária","Ambiental","Eleitoral","Militar","Internacional","Outro"];
const FORMAS_PGTO=["PIX","Boleto","Transferência","Dinheiro","Cartão de Crédito","Cartão de Débito","Cheque","Outro"];
const STATUS_CFG={
  pendente:     {label:"Pendente",              icon:"⏳",color:"#f59e0b"},
  em_pagamento: {label:"Em Pagamento",           icon:"💳",color:"#3b82f6"},
  pago:         {label:"Pago",                   icon:"✅",color:"#10b981"},
  pago_pendente:{label:"Pago · Serviço Pendente",icon:"⚠️",color:"#a78bfa"},
};
const AI_PROMPT=`Você é especialista em contratos jurídicos brasileiros.
Retorne SOMENTE JSON válido, sem texto extra, sem markdown:
{"advogado":"","cliente":"","telefone":"","numeroProcesso":"","areaAtuacao":"Cível","valorTotal":"8500.00","formaPagamento":"","totalParcelas":"3","valorParcela":"2833.33","prazos":"","observacoes":""}
Se não encontrar, deixe como string vazia.`;

const newContract=()=>({id:null,nomeArquivo:"",advogado:"",cliente:"",telefone:"",numeroProcesso:"",areaAtuacao:"Cível",valorTotal:"",formaPagamento:"",totalParcelas:1,valorParcela:"",prazos:"",observacoes:"",status:"pendente",dataUpload:new Date().toLocaleDateString("pt-BR"),coAdvogados:[],schedule:[]});
const newPayment=()=>({id:null,cliente:"",advogado:"",telefone:"",numeroProcesso:"",areaAtuacao:"Cível",descricao:"",valor:"",mes:new Date().getMonth()+1,ano:new Date().getFullYear(),formaPagamento:"PIX",pago:false,dataLancamento:new Date().toLocaleDateString("pt-BR")});

const genId=()=>Date.now()+Math.floor(Math.random()*9999);
const fmt=v=>{const n=parseFloat(String(v??0).replace(/[^\d.,-]/g,"").replace(",","."));return isNaN(n)?(String(v)||"—"):n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});};
const fmtN=v=>parseFloat(String(v??0).replace(/[^\d.,-]/g,"").replace(",","."))||0;

/* ── ATOMS ───────────────────────────────────────────────── */
const Btn=({T,variant="primary",onClick,children,style={},disabled})=>{
  const v={primary:{background:T.accent,color:T.accentText},secondary:{background:T.border,color:T.text,fontWeight:400},danger:{background:T.dangerBg,color:T.dangerText,border:`1px solid ${T.dangerBorder}`},ghost:{background:"transparent",color:T.muted,border:`1px solid ${T.border2}`}};
  return <button onClick={onClick} disabled={disabled} style={{border:"none",borderRadius:7,padding:"8px 16px",cursor:disabled?"not-allowed":"pointer",fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,opacity:disabled?.5:1,...v[variant],...style}}>{children}</button>;
};
const Fld=({T,label,value,onChange,type="text",options,ph="",style={}})=>(
  <div style={{display:"flex",flexDirection:"column",gap:5}}>
    <label style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</label>
    {options
      ?<select value={value} onChange={e=>onChange(e.target.value)} style={{background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"7px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12,...style}}>{options.map(o=><option key={o.v??o} value={o.v??o}>{o.l??o}</option>)}</select>
      :type==="textarea"
        ?<textarea value={value} onChange={e=>onChange(e.target.value)} rows={3} placeholder={ph} style={{background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"7px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12,resize:"vertical",...style}}/>
        :<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} style={{background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"7px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12,...style}}/>}
  </div>
);
const StatCard=({T,label,value,color,sub})=>(
  <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"13px 16px",flex:"1 1 105px",textAlign:"center"}}>
    <div style={{fontSize:24,fontWeight:700,color:color??T.accent,fontFamily:"'Cormorant Garamond',serif",lineHeight:1}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:color??T.accent,fontWeight:600,marginTop:2}}>{sub}</div>}
    <div style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.07em",marginTop:4}}>{label}</div>
  </div>
);
const Modal=({T,title,sub,onClose,children,footer,width=720})=>(
  <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"#00000088",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,width:"100%",maxWidth:width,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 30px 90px #0009"}}>
      <div style={{padding:"18px 24px 14px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:T.accent,fontWeight:700}}>{title}</div>{sub&&<div style={{fontSize:11,color:T.muted,marginTop:2}}>{sub}</div>}</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:T.muted,fontSize:20,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{overflowY:"auto",flex:1,padding:"18px 24px"}}>{children}</div>
      {footer&&<div style={{padding:"12px 24px",borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"flex-end",gap:10}}>{footer}</div>}
    </div>
  </div>
);
const ABadge=({T,area})=><span style={{background:T.infoBg,color:T.infoText,borderRadius:4,padding:"2px 8px",fontSize:11,whiteSpace:"nowrap"}}>{area||"—"}</span>;
const SectionTitle=({T,children})=><div style={{fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,borderBottom:`1px solid ${T.border}`,paddingBottom:6,marginTop:4}}>{children}</div>;

/* ── CONTRATO FORM ───────────────────────────────────────── */
function CForm({T,data,set,nA,sA,nS,sS}){
  function addA(){if(!nA.nome||!nA.pct)return;set(d=>({...d,coAdvogados:[...(d.coAdvogados||[]),{id:genId(),nome:nA.nome,percentual:nA.pct}]}));sA({nome:"",pct:""});}
  function remA(id){set(d=>({...d,coAdvogados:d.coAdvogados.filter(a=>a.id!==id)}));}
  function addS(){if(!nS.valor)return;set(d=>({...d,schedule:[...(d.schedule||[]),{id:genId(),...nS,valor:fmtN(nS.valor)}]}));sS({mes:new Date().getMonth()+1,ano:new Date().getFullYear(),valor:"",descricao:"",pago:false});}
  function togS(sid){set(d=>({...d,schedule:d.schedule.map(s=>s.id===sid?{...s,pago:!s.pago}:s)}));}
  function remS(sid){set(d=>({...d,schedule:d.schedule.filter(s=>s.id!==sid)}));}
  const coSum=(data.coAdvogados||[]).reduce((s,a)=>s+fmtN(a.percentual),0);

  return(
    <div>
      <SectionTitle T={T}>Dados do Processo / Contrato</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <Fld T={T} label="Advogado Responsável" value={data.advogado} onChange={v=>set(d=>({...d,advogado:v}))}/>
        <Fld T={T} label="Cliente" value={data.cliente} onChange={v=>set(d=>({...d,cliente:v}))}/>
        <Fld T={T} label="Telefone / WhatsApp" value={data.telefone||""} onChange={v=>set(d=>({...d,telefone:v}))} ph="(00) 00000-0000"/>
        <Fld T={T} label="Nº do Processo" value={data.numeroProcesso||""} onChange={v=>set(d=>({...d,numeroProcesso:v}))} ph="0000000-00.0000.0.00.0000"/>
        <div style={{gridColumn:"1/-1"}}><Fld T={T} label="Área de Atuação" value={data.areaAtuacao||"Cível"} onChange={v=>set(d=>({...d,areaAtuacao:v}))} options={AREAS}/></div>
      </div>
      <SectionTitle T={T}>Honorários / Pagamento</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <Fld T={T} label="Valor Total (R$)" value={data.valorTotal} onChange={v=>set(d=>({...d,valorTotal:v}))}/>
        <Fld T={T} label="Forma de Pagamento" value={data.formaPagamento} onChange={v=>set(d=>({...d,formaPagamento:v}))} options={FORMAS_PGTO}/>
        <Fld T={T} label="Nº de Parcelas" value={data.totalParcelas} onChange={v=>set(d=>({...d,totalParcelas:v}))} type="number"/>
        <Fld T={T} label="Valor por Parcela" value={data.valorParcela} onChange={v=>set(d=>({...d,valorParcela:v}))}/>
        <div style={{gridColumn:"1/-1"}}><Fld T={T} label="Prazos" value={data.prazos} onChange={v=>set(d=>({...d,prazos:v}))}/></div>
        <div style={{gridColumn:"1/-1"}}><Fld T={T} label="Observações" value={data.observacoes} onChange={v=>set(d=>({...d,observacoes:v}))} type="textarea"/></div>
        <div style={{gridColumn:"1/-1"}}><Fld T={T} label="Status" value={data.status} onChange={v=>set(d=>({...d,status:v}))} options={Object.entries(STATUS_CFG).map(([k,v])=>({v:k,l:`${v.icon} ${v.label}`}))}/></div>
      </div>
      <SectionTitle T={T}>Co-advogados / Divisão de Honorários</SectionTitle>
      <div style={{marginBottom:16}}>
        {(data.coAdvogados||[]).map(a=>(
          <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,background:T.card2,borderRadius:7,padding:"7px 10px"}}>
            <span style={{flex:1,color:T.infoText}}>{a.nome}</span>
            <span style={{color:T.accent,fontWeight:600}}>{a.percentual}%</span>
            <span style={{color:T.muted,fontSize:11}}>{fmt(fmtN(data.valorTotal)*fmtN(a.percentual)/100)}</span>
            <button className="bhov" onClick={()=>remA(a.id)} style={{background:"none",border:"none",color:T.dangerText,fontSize:14}}>✕</button>
          </div>
        ))}
        {(data.coAdvogados||[]).length>0&&<div style={{background:T.successBg,borderRadius:7,padding:"7px 10px",fontSize:12,color:T.successText,marginBottom:8}}>{data.advogado||"Adv. Principal"}: {100-coSum}% = {fmt(fmtN(data.valorTotal)*(100-coSum)/100)}</div>}
        <div style={{display:"flex",gap:8}}>
          <input placeholder="Nome do co-advogado" value={nA.nome} onChange={e=>sA(d=>({...d,nome:e.target.value}))} style={{flex:1,background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"6px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12}}/>
          <input placeholder="%" value={nA.pct} onChange={e=>sA(d=>({...d,pct:e.target.value}))} type="number" min="0" max="100" style={{width:70,background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"6px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12}}/>
          <Btn T={T} variant="ghost" onClick={addA}>+ Add</Btn>
        </div>
      </div>
      <SectionTitle T={T}>Cronograma de Pagamentos</SectionTitle>
      {(data.schedule||[]).map(s=>(
        <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,background:s.pago?T.successBg:T.card2,borderRadius:7,padding:"7px 10px"}}>
          <input type="checkbox" checked={s.pago} onChange={()=>togS(s.id)} style={{cursor:"pointer"}}/>
          <span style={{color:T.muted,fontSize:11,minWidth:52}}>{MFS[s.mes-1]}/{s.ano}</span>
          <span style={{color:T.accent,fontWeight:600}}>{fmt(s.valor)}</span>
          <span style={{flex:1,color:T.muted,fontSize:11}}>{s.descricao}</span>
          <span style={{fontSize:11,color:s.pago?T.successText:T.warnText}}>{s.pago?"✅":"⏳"}</span>
          <button className="bhov" onClick={()=>remS(s.id)} style={{background:"none",border:"none",color:T.muted,fontSize:13}}>✕</button>
        </div>
      ))}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
        <select value={nS.mes} onChange={e=>sS(d=>({...d,mes:Number(e.target.value)}))} style={{background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"6px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12}}>{MFL.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select>
        <input type="number" value={nS.ano} onChange={e=>sS(d=>({...d,ano:Number(e.target.value)}))} style={{width:80,background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"6px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12}}/>
        <input placeholder="R$" value={nS.valor} onChange={e=>sS(d=>({...d,valor:e.target.value}))} style={{width:100,background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"6px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12}}/>
        <input placeholder="Descrição (Parcela 1/3…)" value={nS.descricao} onChange={e=>sS(d=>({...d,descricao:e.target.value}))} style={{flex:1,minWidth:140,background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"6px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12}}/>
        <Btn T={T} variant="ghost" onClick={addS}>+ Parcela</Btn>
      </div>
    </div>
  );
}

/* ── TAB CONTRATOS ───────────────────────────────────────── */
function TabContratos({T,contracts,setContracts}){
  const [loading,setLoading]=useState(false);
  const [loadMsg,setLoadMsg]=useState("");
  const [error,setError]=useState("");
  const [drag,setDrag]=useState(false);
  const [modal,setModal]=useState(null);
  const [editMode,setEditMode]=useState(false);
  const [editData,setEditData]=useState({});
  const [nA,sA]=useState({nome:"",pct:""});
  const [nS,sS]=useState({mes:new Date().getMonth()+1,ano:new Date().getFullYear(),valor:"",descricao:"",pago:false});
  const [showNew,setShowNew]=useState(false);
  const [newData,setNewData]=useState(newContract());
  const [nA2,sA2]=useState({nome:"",pct:""});
  const [nS2,sS2]=useState({mes:new Date().getMonth()+1,ano:new Date().getFullYear(),valor:"",descricao:"",pago:false});
  const fileRef=useRef();

  async function processFile(file){
    setError("");setLoading(true);setLoadMsg("Lendo arquivo...");
    try{
      const isPdf=file.type==="application/pdf",isDocx=file.name.toLowerCase().endsWith(".docx");
      if(!isPdf&&!isDocx)throw new Error("Use PDF ou .docx");
      let messages;
      if(isPdf){
        setLoadMsg("Enviando para análise IA...");
        const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
        messages=[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:AI_PROMPT}]}];
      }else{
        setLoadMsg("Extraindo texto Word...");
        const text=await new Promise((res,rej)=>{const r=new FileReader();r.onload=async e=>{try{res((await mammoth.extractRawText({arrayBuffer:e.target.result})).value);}catch(err){rej(err);}};r.onerror=rej;r.readAsArrayBuffer(file);});
        messages=[{role:"user",content:`${AI_PROMPT}\n\n---\n${text}`}];
      }
      setLoadMsg("IA analisando contrato...");
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":window.__firebase.ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages})});
      const data=await res.json();
      const txt=data.content?.find(b=>b.type==="text")?.text??"{}";
      const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
      setContracts(prev=>[{...newContract(),id:genId(),nomeArquivo:file.name,advogado:p.advogado||"",cliente:p.cliente||"",telefone:p.telefone||"",numeroProcesso:p.numeroProcesso||"",areaAtuacao:p.areaAtuacao||"Cível",valorTotal:p.valorTotal||"",formaPagamento:p.formaPagamento||"",totalParcelas:parseInt(p.totalParcelas)||1,valorParcela:p.valorParcela||"",prazos:p.prazos||"",observacoes:p.observacoes||""},...prev]);
    }catch(e){setError(e.message||"Erro.");}
    finally{setLoading(false);setLoadMsg("");}
  }

  function saveNew(){if(!newData.cliente)return;setContracts(p=>[{...newData,id:genId(),dataUpload:new Date().toLocaleDateString("pt-BR")},...p]);setShowNew(false);setNewData(newContract());sA2({nome:"",pct:""});}
  function openM(c){setModal(c);setEditData({...c});setEditMode(false);sA({nome:"",pct:""});sS({mes:new Date().getMonth()+1,ano:new Date().getFullYear(),valor:"",descricao:"",pago:false});}
  function saveEdit(){setContracts(p=>p.map(c=>c.id===editData.id?{...editData}:c));setModal({...editData});setEditMode(false);}
  function updStatus(id,status){setContracts(p=>p.map(c=>c.id===id?{...c,status}:c));if(modal?.id===id)setModal(s=>({...s,status}));}
  function del(id){if(!confirm("Remover?"))return;setContracts(p=>p.filter(c=>c.id!==id));setModal(null);}
  const tot=contracts.reduce((s,c)=>s+fmtN(c.valorTotal),0);

  return(
    <div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <StatCard T={T} label="Contratos"    value={contracts.length}/>
        <StatCard T={T} label="Pendentes"    value={contracts.filter(c=>c.status==="pendente").length} color="#f59e0b"/>
        <StatCard T={T} label="Em Pagamento" value={contracts.filter(c=>c.status==="em_pagamento").length} color="#3b82f6"/>
        <StatCard T={T} label="Quitados"     value={contracts.filter(c=>c.status==="pago"||c.status==="pago_pendente").length} color="#10b981"/>
        <StatCard T={T} label="Carteira"     sub={fmt(tot)} value=""/>
      </div>

      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"stretch"}}>
        <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files?.[0];if(f)processFile(f);}}
          onClick={()=>!loading&&fileRef.current?.click()}
          style={{border:`2px dashed ${drag?T.accent:T.border2}`,background:drag?T.accentDim:T.card2,borderRadius:10,padding:"12px 20px",cursor:loading?"wait":"pointer",transition:"all .2s",display:"flex",alignItems:"center",gap:10,flex:"1 1 250px"}}>
          <input ref={fileRef} type="file" accept=".pdf,.docx" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(f)processFile(f);e.target.value="";}}/>
          {loading
            ?<><div className="spin" style={{width:20,height:20,border:`3px solid ${T.border2}`,borderTopColor:T.accent,borderRadius:"50%",flexShrink:0}}/><span style={{color:T.muted,fontSize:12}}>{loadMsg}</span></>
            :<><span style={{fontSize:20}}>📄</span><div><div style={{color:T.text,fontWeight:500,fontSize:13}}>Enviar Contrato (PDF / Word)</div><div style={{color:T.muted,fontSize:11}}>IA extrai dados automaticamente</div></div></>}
        </div>
        <Btn T={T} onClick={()=>setShowNew(true)} style={{whiteSpace:"nowrap",alignSelf:"center"}}>+ Cadastrar Manualmente</Btn>
      </div>

      {error&&<div style={{background:T.dangerBg,border:`1px solid ${T.dangerBorder}`,color:T.dangerText,borderRadius:8,padding:"9px 14px",marginBottom:12,fontSize:12}}>⚠ {error}</div>}

      {showNew&&(
        <div style={{background:T.card,border:`1px solid ${T.border2}`,borderRadius:12,padding:18,marginBottom:16}}>
          <div style={{fontSize:13,color:T.accent,fontWeight:600,marginBottom:14}}>+ Novo Contrato / Processo</div>
          <CForm T={T} data={newData} set={setNewData} nA={nA2} sA={sA2} nS={nS2} sS={sS2}/>
          <div style={{display:"flex",gap:8,marginTop:14}}><Btn T={T} variant="secondary" onClick={()=>setShowNew(false)}>Cancelar</Btn><Btn T={T} onClick={saveNew}>💾 Salvar</Btn></div>
        </div>
      )}

      {contracts.length===0
        ?<div style={{textAlign:"center",color:T.muted,padding:"60px 0",fontSize:13}}>Nenhum contrato. Envie um arquivo ou cadastre manualmente.</div>
        :<div style={{overflowX:"auto",borderRadius:10,border:`1px solid ${T.border}`}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:T.card2}}>{["Área","Cliente","Advogado","Processo","Valor","Status","Data",""].map(h=><th key={h} style={{padding:"9px 12px",textAlign:"left",fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",borderBottom:`1px solid ${T.border}`,fontWeight:500,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>
              {contracts.map((c,i)=>{
                const st=STATUS_CFG[c.status]||STATUS_CFG.pendente;
                return(
                  <tr key={c.id} className="row-hover" style={{background:i%2===0?T.card:T.stripe,borderBottom:`1px solid ${T.border}`}}>
                    <td style={{padding:"10px 12px"}}><ABadge T={T} area={c.areaAtuacao}/></td>
                    <td style={{padding:"10px 12px"}}><div style={{fontWeight:500,color:T.strong,fontSize:13}}>{c.cliente||"—"}</div>{c.telefone&&<div style={{fontSize:10,color:T.muted,marginTop:1}}>📞 {c.telefone}</div>}</td>
                    <td style={{padding:"10px 12px",color:T.infoText,fontSize:12}}>{c.advogado||"—"}</td>
                    <td style={{padding:"10px 12px",fontSize:11,color:T.muted,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={c.numeroProcesso}>{c.numeroProcesso||"—"}</td>
                    <td style={{padding:"10px 12px",color:T.accent,fontWeight:700}}>{fmt(c.valorTotal)}</td>
                    <td style={{padding:"10px 12px"}}>
                      <select value={c.status} onChange={e=>updStatus(c.id,e.target.value)} style={{background:T.card2,color:st.color,border:`1px solid ${st.color}55`,borderRadius:6,padding:"3px 8px",fontSize:11,fontFamily:"'DM Mono',monospace",cursor:"pointer",appearance:"none"}}>
                        {Object.entries(STATUS_CFG).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
                      </select>
                    </td>
                    <td style={{padding:"10px 12px",color:T.muted,fontSize:11,whiteSpace:"nowrap"}}>{c.dataUpload}</td>
                    <td style={{padding:"10px 12px"}}><div style={{display:"flex",gap:5}}>
                      <button className="bhov" onClick={()=>openM(c)} style={{background:T.infoBg,border:"none",borderRadius:5,padding:"5px 9px",fontSize:13}}>🔍</button>
                      <button className="bhov" onClick={()=>del(c.id)} style={{background:T.dangerBg,border:"none",borderRadius:5,padding:"5px 9px",fontSize:13}}>🗑</button>
                    </div></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>}

      {modal&&(
        <Modal T={T} title={modal.cliente||"Contrato"} sub={`${modal.areaAtuacao||""}${modal.numeroProcesso?" · "+modal.numeroProcesso:""}`} onClose={()=>setModal(null)}
          footer={editMode
            ?<><Btn T={T} variant="secondary" onClick={()=>{setEditMode(false);setEditData({...modal});}}>Cancelar</Btn><Btn T={T} onClick={saveEdit}>💾 Salvar</Btn></>
            :<><Btn T={T} variant="danger" onClick={()=>del(modal.id)}>Remover</Btn><Btn T={T} onClick={()=>setEditMode(true)}>✏ Editar</Btn></>}>
          {editMode
            ?<CForm T={T} data={editData} set={setEditData} nA={nA} sA={sA} nS={nS} sS={sS}/>
            :<div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                {[["Área",<ABadge T={T} area={modal.areaAtuacao}/>],["Advogado",modal.advogado],["Cliente",modal.cliente],["Telefone",modal.telefone||"—"],["Nº Processo",modal.numeroProcesso||"—"],["Valor Total",fmt(modal.valorTotal)],["Forma de Pgto",modal.formaPagamento||"—"],["Parcelas",modal.totalParcelas>1?`${modal.totalParcelas}× ${fmt(modal.valorParcela)}`:"À vista"],["Status",`${STATUS_CFG[modal.status]?.icon} ${STATUS_CFG[modal.status]?.label}`],["Cadastrado",modal.dataUpload]].map(([l,v])=>(
                  <div key={l} style={{background:T.card2,borderRadius:8,padding:"10px 13px",border:`1px solid ${T.border}`}}>
                    <div style={{fontSize:10,color:T.muted,textTransform:"uppercase",marginBottom:3}}>{l}</div>
                    <div style={{color:T.strong,fontSize:13}}>{v||"—"}</div>
                  </div>
                ))}
                {modal.observacoes&&<div style={{gridColumn:"1/-1",background:T.card2,borderRadius:8,padding:"10px 13px",border:`1px solid ${T.border}`}}><div style={{fontSize:10,color:T.muted,textTransform:"uppercase",marginBottom:3}}>Observações</div><div style={{color:T.text,fontSize:12,whiteSpace:"pre-wrap"}}>{modal.observacoes}</div></div>}
              </div>
              {(modal.coAdvogados||[]).length>0&&(
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Divisão de Honorários</div>
                  <div style={{background:T.card2,borderRadius:8,border:`1px solid ${T.border}`,overflow:"hidden"}}>
                    {[{nome:modal.advogado||"Adv. Principal",percentual:100-(modal.coAdvogados||[]).reduce((s,a)=>s+fmtN(a.percentual),0),principal:true},...(modal.coAdvogados||[])].map((a,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 13px",borderBottom:i<modal.coAdvogados.length?`1px solid ${T.border}`:"none"}}>
                        <span style={{flex:1,color:a.principal?T.accent:T.infoText,fontWeight:a.principal?600:400}}>{a.nome}</span>
                        <span style={{color:T.muted}}>{a.percentual}%</span>
                        <span style={{color:T.accent,fontWeight:600}}>{fmt(fmtN(modal.valorTotal)*fmtN(a.percentual)/100)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {(modal.schedule||[]).length>0&&(
                <div>
                  <div style={{fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Cronograma</div>
                  {modal.schedule.map(s=>(
                    <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,background:s.pago?T.successBg:T.card2,borderRadius:7,padding:"8px 12px",border:`1px solid ${s.pago?T.successText+"33":T.border}`}}>
                      <span style={{color:T.muted,fontSize:11,minWidth:52}}>{MFS[s.mes-1]}/{s.ano}</span>
                      <span style={{color:T.accent,fontWeight:700}}>{fmt(s.valor)}</span>
                      <span style={{flex:1,color:T.muted,fontSize:11}}>{s.descricao}</span>
                      <span style={{fontSize:11,color:s.pago?T.successText:T.warnText,fontWeight:600}}>{s.pago?"✅ Pago":"⏳ Pendente"}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>}
        </Modal>
      )}
    </div>
  );
}

/* ── TAB PAGAMENTOS ──────────────────────────────────────── */
function TabPagamentos({T,contracts,setContracts,manual,setManual}){
  const now=new Date();
  const [mes,setMes]=useState(now.getMonth()+1);
  const [ano,setAno]=useState(now.getFullYear());
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState(newPayment());
  const [editId,setEditId]=useState(null);
  const years=Array.from({length:6},(_,i)=>now.getFullYear()-2+i);

  const schedE=contracts.flatMap(c=>(c.schedule||[]).filter(s=>s.mes===mes&&s.ano===ano).map(s=>({...s,_t:"s",contrato:c})));
  const manE  =manual.filter(p=>p.mes===mes&&p.ano===ano).map(p=>({...p,_t:"m"}));
  const all   =[...schedE,...manE];
  const totE  =all.reduce((s,e)=>s+fmtN(e.valor),0);
  const totR  =all.filter(e=>e.pago).reduce((s,e)=>s+fmtN(e.valor),0);
  const noSch =contracts.filter(c=>c.status==="em_pagamento"&&!(c.schedule||[]).some(s=>s.mes===mes&&s.ano===ano));

  function togS(cid,sid){setContracts(p=>p.map(c=>c.id===cid?{...c,schedule:c.schedule.map(s=>s.id===sid?{...s,pago:!s.pago}:s)}:c));}
  function togM(id){setManual(p=>p.map(x=>x.id===id?{...x,pago:!x.pago}:x));}
  function saveForm(){
    if(!form.cliente||!form.valor)return;
    if(editId){setManual(p=>p.map(x=>x.id===editId?{...form,id:editId,valor:fmtN(form.valor)}:x));}
    else{setManual(p=>[...p,{...form,id:genId(),valor:fmtN(form.valor),dataLancamento:new Date().toLocaleDateString("pt-BR")}]);}
    setForm(newPayment());setEditId(null);setShowForm(false);
  }
  function editE(e){setForm({...e,valor:String(e.valor)});setEditId(e.id);setShowForm(true);}
  function delM(id){if(!confirm("Remover?"))return;setManual(p=>p.filter(x=>x.id!==id));}

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:T.accent,fontWeight:700}}>Pagamentos —</span>
        <select value={mes} onChange={e=>setMes(Number(e.target.value))} style={{background:T.card,border:`1px solid ${T.border2}`,borderRadius:8,padding:"7px 13px",color:T.strong,fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,cursor:"pointer"}}>{MFL.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select>
        <select value={ano} onChange={e=>setAno(Number(e.target.value))} style={{background:T.card,border:`1px solid ${T.border2}`,borderRadius:8,padding:"7px 13px",color:T.strong,fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,cursor:"pointer"}}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        <div style={{flex:1}}/>
        {[-1,1].map(d=><Btn key={d} T={T} variant="ghost" onClick={()=>{let m=mes+d,a=ano;if(m<1){m=12;a--;}if(m>12){m=1;a++;}setMes(m);setAno(a);}} style={{padding:"6px 12px"}}>{d===-1?"← Anterior":"Próximo →"}</Btn>)}
        <Btn T={T} onClick={()=>{setEditId(null);setForm({...newPayment(),mes,ano});setShowForm(true);}}>+ Novo Pagamento</Btn>
      </div>

      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <StatCard T={T} label="Esperado"    sub={fmt(totE)}      value="" color={T.accent}/>
        <StatCard T={T} label="Recebido"    sub={fmt(totR)}      value="" color="#10b981"/>
        <StatCard T={T} label="Pendente"    sub={fmt(totE-totR)} value="" color="#f59e0b"/>
        <StatCard T={T} label="Lançamentos" value={all.length}/>
      </div>

      {totE>0&&<div style={{marginBottom:16}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.muted,marginBottom:4}}><span>Progresso de recebimentos</span><span>{Math.round(totR/totE*100)}%</span></div><div style={{height:8,background:T.border,borderRadius:4,overflow:"hidden"}}><div style={{width:`${Math.min(100,totR/totE*100)}%`,height:"100%",background:T.accent,borderRadius:4,transition:"width .4s"}}/></div></div>}

      {/* form novo pagamento manual */}
      {showForm&&(
        <div style={{background:T.card,border:`1px solid ${T.border2}`,borderRadius:12,padding:18,marginBottom:16}}>
          <div style={{fontSize:13,color:T.accent,fontWeight:600,marginBottom:14}}>{editId?"✏ Editar Pagamento":"+ Novo Pagamento Manual"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <Fld T={T} label="Cliente" value={form.cliente} onChange={v=>setForm(d=>({...d,cliente:v}))}/>
            <Fld T={T} label="Advogado" value={form.advogado} onChange={v=>setForm(d=>({...d,advogado:v}))}/>
            <Fld T={T} label="Telefone / WhatsApp" value={form.telefone} onChange={v=>setForm(d=>({...d,telefone:v}))} ph="(00) 00000-0000"/>
            <Fld T={T} label="Nº do Processo" value={form.numeroProcesso} onChange={v=>setForm(d=>({...d,numeroProcesso:v}))}/>
            <div style={{gridColumn:"1/-1"}}><Fld T={T} label="Área de Atuação" value={form.areaAtuacao} onChange={v=>setForm(d=>({...d,areaAtuacao:v}))} options={AREAS}/></div>
            <Fld T={T} label="Descrição / Referência" value={form.descricao} onChange={v=>setForm(d=>({...d,descricao:v}))} ph="ex: Honorários iniciais, Parcela 2/3…"/>
            <Fld T={T} label="Valor (R$)" value={form.valor} onChange={v=>setForm(d=>({...d,valor:v}))}/>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>Mês</label>
              <select value={form.mes} onChange={e=>setForm(d=>({...d,mes:Number(e.target.value)}))} style={{background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"7px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12}}>{MFL.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select>
            </div>
            <Fld T={T} label="Ano" value={form.ano} onChange={v=>setForm(d=>({...d,ano:Number(v)}))} type="number"/>
            <Fld T={T} label="Forma de Pagamento" value={form.formaPagamento} onChange={v=>setForm(d=>({...d,formaPagamento:v}))} options={FORMAS_PGTO}/>
            <div style={{display:"flex",alignItems:"center",gap:8,paddingTop:22}}>
              <input type="checkbox" checked={form.pago} onChange={e=>setForm(d=>({...d,pago:e.target.checked}))} style={{accentColor:T.accent,width:16,height:16,cursor:"pointer"}}/>
              <label style={{fontSize:12,color:T.text,cursor:"pointer"}}>Já recebido</label>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}><Btn T={T} variant="secondary" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancelar</Btn><Btn T={T} onClick={saveForm}>💾 Salvar</Btn></div>
        </div>
      )}

      {all.length===0&&noSch.length===0
        ?<div style={{textAlign:"center",color:T.muted,padding:"60px 0"}}><div style={{fontSize:32,marginBottom:12}}>📭</div>Nenhum pagamento em {MFL[mes-1]} de {ano}.<br/><span style={{fontSize:11}}>Use "+ Novo Pagamento" ou adicione parcelas nos contratos.</span></div>
        :<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {all.map(e=>{
            const isSch=e._t==="s";
            const c=isSch?e.contrato:null;
            const coAdvs=isSch?(c.coAdvogados||[]):[];
            const primP=100-coAdvs.reduce((s,a)=>s+fmtN(a.percentual),0);
            return(
              <div key={e.id} style={{background:e.pago?T.successBg:T.card,border:`1px solid ${e.pago?T.successText+"44":T.border}`,borderRadius:12,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 18px"}}>
                  <input type="checkbox" checked={e.pago} onChange={()=>isSch?togS(c.id,e.id):togM(e.id)} style={{width:18,height:18,cursor:"pointer",accentColor:T.accent}}/>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:3}}>
                      <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:T.strong,fontWeight:600}}>{isSch?c.cliente:e.cliente}</span>
                      <ABadge T={T} area={isSch?c.areaAtuacao:e.areaAtuacao}/>
                      {!isSch&&<span style={{fontSize:10,background:T.warnBg,color:T.warnText,borderRadius:4,padding:"1px 6px"}}>Manual</span>}
                    </div>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                      <span style={{fontSize:12,color:T.infoText}}>{isSch?c.advogado:e.advogado}</span>
                      {(isSch?c.numeroProcesso:e.numeroProcesso)&&<span style={{fontSize:11,color:T.muted}}>Proc: {isSch?c.numeroProcesso:e.numeroProcesso}</span>}
                      {(isSch?c.telefone:e.telefone)&&<span style={{fontSize:11,color:T.muted}}>📞 {isSch?c.telefone:e.telefone}</span>}
                      {e.descricao&&<span style={{fontSize:11,color:T.muted}}>— {e.descricao}</span>}
                    </div>
                    {(isSch?c.formaPagamento:e.formaPagamento)&&<div style={{fontSize:11,color:T.muted,marginTop:2}}>{isSch?c.formaPagamento:e.formaPagamento}</div>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:20,fontWeight:700,color:T.accent,fontFamily:"'Cormorant Garamond',serif"}}>{fmt(e.valor)}</div>
                    <div style={{fontSize:11,color:e.pago?T.successText:T.warnText,fontWeight:600}}>{e.pago?"✅ Recebido":"⏳ Aguardando"}</div>
                  </div>
                  {!isSch&&<div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                    <button className="bhov" onClick={()=>editE(e)} style={{background:T.infoBg,border:"none",borderRadius:5,padding:"4px 8px",fontSize:12}}>✏</button>
                    <button className="bhov" onClick={()=>delM(e.id)} style={{background:T.dangerBg,border:"none",borderRadius:5,padding:"4px 8px",fontSize:12}}>🗑</button>
                  </div>}
                </div>
                {coAdvs.length>0&&(
                  <div style={{borderTop:`1px solid ${T.border}`,padding:"10px 18px",background:T.card2}}>
                    <div style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Divisão Proporcional</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {[{nome:c.advogado||"Adv. Principal",percentual:primP},...coAdvs].map((a,i)=>(
                        <div key={i} style={{background:T.card,borderRadius:8,padding:"8px 12px",border:`1px solid ${T.border}`,flex:"1 1 130px"}}>
                          <div style={{fontSize:11,color:i===0?T.accent:T.infoText,fontWeight:600}}>{a.nome}</div>
                          <div style={{fontSize:13,color:T.strong,fontWeight:700}}>{fmt(fmtN(e.valor)*fmtN(a.percentual)/100)}</div>
                          <div style={{fontSize:10,color:T.muted}}>{a.percentual}%</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
          {noSch.length>0&&<div style={{background:T.warnBg,border:`1px solid ${T.warnText}44`,borderRadius:12,padding:"13px 18px"}}><div style={{fontSize:11,color:T.warnText,fontWeight:600,marginBottom:8}}>⚠ Contratos Em Pagamento sem parcela neste mês</div>{noSch.map(c=><div key={c.id} style={{fontSize:12,color:T.muted,marginBottom:4}}>· {c.cliente} — {fmt(c.valorTotal)}</div>)}</div>}
        </div>}
    </div>
  );
}

/* ── TAB CUSTOS ──────────────────────────────────────────── */
function TabCustos({T,costs,setCosts}){
  const now=new Date();
  const [mes,setMes]=useState(now.getMonth()+1);
  const [ano,setAno]=useState(now.getFullYear());
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({descricao:"",categoria:"Aluguel",valor:"",recorrente:false,mes:now.getMonth()+1,ano:now.getFullYear(),pago:false});
  const [editId,setEditId]=useState(null);
  const monthly=costs.filter(c=>c.mes===mes&&c.ano===ano);
  const years=Array.from({length:6},(_,i)=>now.getFullYear()-2+i);
  const totM=monthly.reduce((s,c)=>s+fmtN(c.valor),0);
  const totP=monthly.filter(c=>c.pago).reduce((s,c)=>s+fmtN(c.valor),0);
  const byCat=COST_CATS.map(cat=>({cat,tot:monthly.filter(c=>c.categoria===cat).reduce((s,c)=>s+fmtN(c.valor),0)})).filter(g=>g.tot>0);

  function save(){
    if(!form.descricao||!form.valor)return;
    if(editId){setCosts(p=>p.map(c=>c.id===editId?{...form,id:editId,valor:fmtN(form.valor)}:c));setEditId(null);}
    else{
      const base={...form,id:genId(),valor:fmtN(form.valor)};
      if(form.recorrente){const all=Array.from({length:12},(_,i)=>{let m=form.mes+i,a=form.ano;while(m>12){m-=12;a++;}return{...base,id:i===0?base.id:genId(),mes:m,ano:a};});setCosts(p=>[...p,...all]);}
      else setCosts(p=>[...p,base]);
    }
    setForm({descricao:"",categoria:"Aluguel",valor:"",recorrente:false,mes,ano,pago:false});setShowForm(false);
  }

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:T.accent,fontWeight:700}}>Custos —</span>
        <select value={mes} onChange={e=>setMes(Number(e.target.value))} style={{background:T.card,border:`1px solid ${T.border2}`,borderRadius:8,padding:"7px 13px",color:T.strong,fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,cursor:"pointer"}}>{MFL.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select>
        <select value={ano} onChange={e=>setAno(Number(e.target.value))} style={{background:T.card,border:`1px solid ${T.border2}`,borderRadius:8,padding:"7px 13px",color:T.strong,fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,cursor:"pointer"}}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        <div style={{flex:1}}/>
        <Btn T={T} onClick={()=>{setEditId(null);setForm({descricao:"",categoria:"Aluguel",valor:"",recorrente:false,mes,ano,pago:false});setShowForm(true);}}>+ Novo Custo</Btn>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <StatCard T={T} label="Total"       sub={fmt(totM)}     value="" color={T.accent}/>
        <StatCard T={T} label="Pago"        sub={fmt(totP)}     value="" color="#10b981"/>
        <StatCard T={T} label="A Pagar"     sub={fmt(totM-totP)} value="" color="#f59e0b"/>
        <StatCard T={T} label="Lançamentos" value={monthly.length}/>
      </div>
      {byCat.length>0&&<div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>{byCat.map(g=><div key={g.cat} style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",flex:"1 1 100px",textAlign:"center"}}><div style={{fontSize:12,color:T.accent,fontWeight:700}}>{fmt(g.tot)}</div><div style={{fontSize:10,color:T.muted,marginTop:2}}>{g.cat}</div></div>)}</div>}
      {showForm&&(
        <div style={{background:T.card,border:`1px solid ${T.border2}`,borderRadius:12,padding:18,marginBottom:16}}>
          <div style={{fontSize:13,color:T.accent,fontWeight:600,marginBottom:14}}>{editId?"✏ Editar":"+ Novo Custo"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <div style={{gridColumn:"1/-1"}}><Fld T={T} label="Descrição" value={form.descricao} onChange={v=>setForm(d=>({...d,descricao:v}))}/></div>
            <Fld T={T} label="Categoria" value={form.categoria} onChange={v=>setForm(d=>({...d,categoria:v}))} options={COST_CATS}/>
            <Fld T={T} label="Valor R$" value={form.valor} onChange={v=>setForm(d=>({...d,valor:v}))}/>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>Mês</label><select value={form.mes} onChange={e=>setForm(d=>({...d,mes:Number(e.target.value)}))} style={{background:T.inp,border:`1px solid ${T.border2}`,borderRadius:6,padding:"7px 10px",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:12}}>{MFL.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select></div>
            <Fld T={T} label="Ano" value={form.ano} onChange={v=>setForm(d=>({...d,ano:Number(v)}))} type="number"/>
          </div>
          <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:14}}>
            <label style={{display:"flex",gap:8,alignItems:"center",cursor:"pointer",fontSize:12,color:T.text}}><input type="checkbox" checked={form.pago} onChange={e=>setForm(d=>({...d,pago:e.target.checked}))} style={{accentColor:T.accent}}/> Já pago</label>
            {!editId&&<label style={{display:"flex",gap:8,alignItems:"center",cursor:"pointer",fontSize:12,color:T.text}}><input type="checkbox" checked={form.recorrente} onChange={e=>setForm(d=>({...d,recorrente:e.target.checked}))} style={{accentColor:T.accent}}/> Recorrente (12 meses)</label>}
          </div>
          <div style={{display:"flex",gap:8}}><Btn T={T} variant="secondary" onClick={()=>setShowForm(false)}>Cancelar</Btn><Btn T={T} onClick={save}>💾 Salvar</Btn></div>
        </div>
      )}
      {monthly.length===0
        ?<div style={{textAlign:"center",color:T.muted,padding:"60px 0"}}><div style={{fontSize:32,marginBottom:12}}>🏢</div>Nenhum custo em {MFL[mes-1]} de {ano}.</div>
        :<div style={{overflowX:"auto",borderRadius:10,border:`1px solid ${T.border}`}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:T.card2}}>{["","Descrição","Categoria","Valor","Mês","Status",""].map(h=><th key={h} style={{padding:"9px 12px",textAlign:"left",fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",borderBottom:`1px solid ${T.border}`,fontWeight:500}}>{h}</th>)}</tr></thead>
            <tbody>
              {monthly.map((c,i)=>(
                <tr key={c.id} className="row-hover" style={{background:i%2===0?T.card:T.stripe,borderBottom:`1px solid ${T.border}`}}>
                  <td style={{padding:"9px 12px"}}><input type="checkbox" checked={c.pago} onChange={()=>setCosts(p=>p.map(x=>x.id===c.id?{...x,pago:!x.pago}:x))} style={{cursor:"pointer",accentColor:T.accent}}/></td>
                  <td style={{padding:"9px 12px",color:T.strong}}>{c.descricao}</td>
                  <td style={{padding:"9px 12px"}}><span style={{background:T.card2,border:`1px solid ${T.border2}`,borderRadius:4,padding:"2px 8px",fontSize:11,color:T.muted}}>{c.categoria}</span></td>
                  <td style={{padding:"9px 12px",color:T.accent,fontWeight:700}}>{fmt(c.valor)}</td>
                  <td style={{padding:"9px 12px",color:T.muted,fontSize:11}}>{MFS[c.mes-1]}/{c.ano}</td>
                  <td style={{padding:"9px 12px"}}><span style={{fontSize:11,color:c.pago?T.successText:T.dangerText,fontWeight:600}}>{c.pago?"✅ Pago":"🔴 Pendente"}</span></td>
                  <td style={{padding:"9px 12px"}}><div style={{display:"flex",gap:5}}>
                    <button className="bhov" onClick={()=>{setForm({...c,valor:String(c.valor)});setEditId(c.id);setShowForm(true);}} style={{background:T.infoBg,border:"none",borderRadius:5,padding:"4px 8px",fontSize:12}}>✏</button>
                    <button className="bhov" onClick={()=>setCosts(p=>p.filter(x=>x.id!==c.id))} style={{background:T.dangerBg,border:"none",borderRadius:5,padding:"4px 8px",fontSize:12}}>🗑</button>
                  </div></td>
                </tr>
              ))}
            </tbody>
            <tfoot><tr style={{background:T.card2,borderTop:`2px solid ${T.border2}`}}><td colSpan={3} style={{padding:"10px 12px",fontSize:11,color:T.muted,textTransform:"uppercase"}}>Total</td><td style={{padding:"10px 12px",color:T.accent,fontWeight:700,fontSize:14}}>{fmt(totM)}</td><td colSpan={3} style={{padding:"10px 12px",fontSize:11,color:T.muted}}>Pago: {fmt(totP)} · A pagar: {fmt(totM-totP)}</td></tr></tfoot>
          </table>
        </div>}
    </div>
  );
}

/* ── APP PRINCIPAL ───────────────────────────────────────── */
function App(){
  const [themeId,setThemeId]     = useState("industrial"); // ← padrão industrial
  const [tab,setTab]             = useState("contratos");
  const [contracts,setContracts] = useState([]);
  const [costs,setCosts]         = useState([]);
  const [manual,setManual]       = useState([]);
  const [loaded,setLoaded]       = useState(false);
  const [fbReady,setFbReady]     = useState(!!window.__firebase);
  const [syncState,setSyncState] = useState("offline");
  const [syncMsg,setSyncMsg]     = useState("Aguardando Firebase...");
  const timers = useRef({});
  const T = THEMES[themeId];

  // aguarda Firebase
  useEffect(()=>{
    if(window.__firebase){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("firebase-ready",h);
    return()=>window.removeEventListener("firebase-ready",h);
  },[]);

  // subscriptions
  useEffect(()=>{
    if(!fbReady||!window.__firebase)return;
    setSyncState("syncing");setSyncMsg("Conectando ao Firebase...");
    const fb=window.__firebase;
    const u1=fb.subscribeList("contracts",it=>{setContracts(it);setLoaded(true);setSyncState("ok");setSyncMsg("Sincronizado · "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));});
    const u2=fb.subscribeList("costs",it=>setCosts(it));
    const u3=fb.subscribeList("manualPayments",it=>setManual(it));
    const u4=fb.subscribeSetting("theme",v=>{if(v)setThemeId(v);});
    return()=>{u1();u2();u3();u4();};
  },[fbReady]);

  function debSave(key,fn,label){
    clearTimeout(timers.current[key]);
    timers.current[key]=setTimeout(async()=>{
      if(!window.__firebase)return;
      setSyncState("syncing");setSyncMsg(`Salvando ${label}...`);
      try{await fn();setSyncState("ok");setSyncMsg("Sincronizado · "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));}
      catch(e){setSyncState("error");setSyncMsg("Erro ao sincronizar: "+e.message);}
    },900);
  }
  useEffect(()=>{if(loaded)debSave("c",()=>window.__firebase.saveList("contracts",contracts),"contratos");},[contracts]);
  useEffect(()=>{if(loaded)debSave("co",()=>window.__firebase.saveList("costs",costs),"custos");},[costs]);
  useEffect(()=>{if(loaded)debSave("mp",()=>window.__firebase.saveList("manualPayments",manual),"pagamentos");},[manual]);
  useEffect(()=>{if(fbReady)debSave("th",()=>window.__firebase.saveSetting("theme",themeId),"tema");},[themeId]);

  // cores da barra de sync por estado
  const SC={
    ok:     {bg:T.sOkBg, tx:T.sOkTx, dot:T.sOkDot,  label:"✔ "+syncMsg},
    syncing:{bg:T.sWaitBg,tx:T.sWaitTx,dot:T.sWaitDot,label:"⟳ "+syncMsg},
    error:  {bg:T.sErrBg,tx:T.sErrTx, dot:T.sErrDot, label:"⚠ "+syncMsg},
    offline:{bg:T.sWaitBg,tx:T.sWaitTx,dot:T.sWaitDot,label:"⏳ "+syncMsg},
  };
  const sc=SC[syncState]||SC.offline;

  const TABS=[{id:"contratos",label:"📄 Contratos"},{id:"pagamentos",label:"💰 Pagamentos"},{id:"custos",label:"🏢 Custos Operacionais"}];

  return(
    <div style={{background:T.bg,minHeight:"100vh",color:T.text,fontFamily:"'DM Mono',monospace",fontSize:13}}>
      <style>{`.row-hover:hover{background:${T.hover}!important;}`}</style>

      {/* ── BARRA DE SYNC (sempre visível no topo) ── */}
      <div style={{background:sc.bg,borderBottom:`1px solid ${sc.dot}55`,padding:"5px 20px",display:"flex",alignItems:"center",gap:8,minHeight:28,position:"sticky",top:0,zIndex:101}}>
        <span className={syncState==="syncing"?"pulse":""} style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:sc.dot,flexShrink:0}}/>
        <span style={{fontSize:11,color:sc.tx,fontWeight:500,flex:1}}>{sc.label}</span>
        {syncState==="error"&&<button onClick={()=>{setSyncState("offline");setSyncMsg("—");}} style={{background:"none",border:`1px solid ${sc.dot}`,borderRadius:5,padding:"2px 8px",fontSize:10,color:sc.tx,cursor:"pointer"}}>✕</button>}
      </div>

      {/* ── HEADER ── */}
      <div style={{background:T.hdr,borderBottom:`1px solid ${T.border}`,padding:"11px 22px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",position:"sticky",top:28,zIndex:99}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginRight:8}}>
          <span style={{fontSize:24,filter:`drop-shadow(0 0 8px ${T.accent}88)`}}>⚖️</span>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.accent,lineHeight:1}}>LexControl</div>
            <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:"0.12em"}}>Gestão de Escritório</div>
          </div>
        </div>
        <div style={{display:"flex",gap:3,background:T.card2,borderRadius:10,padding:3,border:`1px solid ${T.border}`}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className="bhov" style={{background:tab===t.id?T.tabActive:"transparent",color:tab===t.id?T.tabActiveText:T.muted,border:"none",borderRadius:7,padding:"6px 13px",fontSize:12,fontFamily:"'DM Mono',monospace",fontWeight:tab===t.id?600:400,transition:"all .18s",whiteSpace:"nowrap"}}>{t.label}</button>)}
        </div>
        <div style={{flex:1}}/>
        <div style={{display:"flex",gap:4}}>
          {Object.values(THEMES).map(th=><button key={th.id} onClick={()=>setThemeId(th.id)} className="bhov" style={{background:themeId===th.id?T.accent:T.card2,color:themeId===th.id?T.accentText:T.muted,border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 10px",fontSize:11,fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>{th.label}</button>)}
        </div>
      </div>

      {/* ── CONTEÚDO ── */}
      <div style={{padding:"20px 22px",maxWidth:1200,margin:"0 auto"}}>
        {!loaded
          ?<div style={{textAlign:"center",padding:"80px 0",color:T.muted,display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
            <div className="spin" style={{width:32,height:32,border:`3px solid ${T.border2}`,borderTopColor:T.accent,borderRadius:"50%"}}/>
            Conectando ao Firebase...
          </div>
          :tab==="contratos" ?<TabContratos T={T} contracts={contracts} setContracts={setContracts}/>
          :tab==="pagamentos"?<TabPagamentos T={T} contracts={contracts} setContracts={setContracts} manual={manual} setManual={setManual}/>
          :<TabCustos T={T} costs={costs} setCosts={setCosts}/>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
